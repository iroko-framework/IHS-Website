<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Foundation Day 2025 Community Gallery from the Iroko Historical Society, leading to the PhotoShelter gallery of community-submitted images.">
  <title>Foundation Day 2025 Community Gallery &mdash; Iroko Historical Society</title>
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Iroko Historical Society">
  <meta property="og:title"       content="Foundation Day 2025 Community Gallery — Iroko Historical Society">
  <meta property="og:description" content="Open the IHS PhotoShelter gallery for Foundation Day 2025 community-submitted photographs and sacred-tree images.">
  <meta property="og:url"         content="https://irokosociety.org/foundation-day/community-gallery-2025.html">
  <meta property="og:image"       content="https://irokosociety.org/assets/og-community-gallery-2025.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type"   content="image/png">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Foundation Day 2025 Community Gallery — Iroko Historical Society">
  <meta name="twitter:description" content="Open the IHS PhotoShelter gallery for Foundation Day 2025 community-submitted photographs and sacred-tree images.">
  <meta name="twitter:image"       content="https://irokosociety.org/assets/og-community-gallery-2025.png">  <link rel="canonical" href="https://irokosociety.org/foundation-day/community-gallery-2025.html">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" type="image/svg+xml" href="../assets/IHS-Logo.svg">
  <style>
    body{min-height:100vh;margin:0;background:var(--cream);color:var(--text-main)}
    .redirect-page{min-height:100vh;display:grid;place-items:center;padding:2rem;background:linear-gradient(180deg,var(--cream) 0%,var(--cream-light) 100%)}
    .redirect-message{max-width:560px;text-align:center}
    .redirect-eyebrow{font-family:var(--font-sans);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--green-mid);margin-bottom:1rem}
    .redirect-message h1{font-family:var(--font-display);font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;color:var(--green-deep);line-height:1.15;margin:0 0 1rem}
    .redirect-message p{font-family:var(--font-sans);font-size:.95rem;line-height:1.8;color:var(--text-muted);margin:0 auto 1rem}
    .countdown{font-family:var(--font-display);font-size:clamp(2.2rem,10vw,4rem);font-weight:700;color:var(--green-deep);line-height:1;margin:1.4rem 0 .45rem}
    .countdown-label{font-family:var(--font-sans);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)}
    .noscript-note{max-width:560px;margin:1.5rem auto 0;font-family:var(--font-sans);font-size:.86rem;line-height:1.7;color:var(--text-muted)}
    .noscript-note a{color:var(--green-deep)}
  </style>
</head>
<body>
  <main class="redirect-page" aria-labelledby="gallery-title">
    <section class="redirect-message">
      <p class="redirect-eyebrow">Iroko Historical Society</p>
      <h1 id="gallery-title">Foundation Day 2025 Community Gallery</h1>
      <p>
        You are being sent to the IHS PhotoShelter gallery for the 2025 community
        submissions.
      </p>
      <div class="countdown" id="countdown" aria-live="polite">8</div>
      <div class="countdown-label">seconds</div>
      <noscript>
        <p class="noscript-note">
          Automatic forwarding requires JavaScript.
          <a href="https://irokosociety.photoshelter.com/gallery/G0000emYJ_7Ralo8">Open the gallery</a>.
        </p>
      </noscript>
    </section>
  </main>

  <script>
  (function(){
    var galleryUrl = 'https://irokosociety.photoshelter.com/gallery/G0000emYJ_7Ralo8';
    var redirectDelaySeconds = 8;
    var remaining = redirectDelaySeconds;
    var countdown = document.getElementById('countdown');

    function renderCountdown(){
      countdown.textContent = String(Math.max(remaining, 0));
    }

    renderCountdown();
    var timer = window.setInterval(function(){
      remaining -= 1;
      renderCountdown();
      if (remaining <= 0) {
        window.clearInterval(timer);
        window.location.assign(galleryUrl);
      }
    }, 1000);
  })();
  </script>
</body>
</html>
